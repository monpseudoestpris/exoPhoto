<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExoPhoto</title>
    <meta name="theme-color" content="#d4af37">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icons/icon-192.svg" type="image/svg+xml">
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
</head>
<body>
    <nav id="main-nav"></nav>
    <main id="app"></main>
    <footer id="main-footer">
        <small>ExoPhoto · OCR Mistral · Bibliotheque locale d'exercices · <span id="app-version-tag"></span></small>
    </footer>

    <script src="js/version.js"></script>
    <script src="js/router.js"></script>
    <script src="js/settings.js"></script>
    <script src="js/provider-keys.js"></script>
    <script src="js/db.js"></script>
    <script src="js/image-utils.js"></script>
    <script src="js/mistral-ocr-client.js"></script>
    <script src="js/scan-store.js"></script>
    <script src="js/exercise-store.js"></script>
    <script src="js/ai-coach-client.js"></script>
    <script src="js/voice-input.js"></script>
    <script src="js/components.js"></script>
    <script src="js/exercise-splitter.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
    <script src="js/views/home.js"></script>
    <script src="js/views/capture.js"></script>
    <script src="js/views/library.js"></script>
    <script src="js/views/exercise.js"></script>
    <script src="js/views/coach.js"></script>
    <script src="js/views/courses.js"></script>
    <script src="js/views/settings.js"></script>
    <script src="js/app.js"></script>
    <script>
    (function () {
        var versionTag = document.getElementById('app-version-tag');
        if (versionTag && window.App && window.App.VERSION) {
            versionTag.textContent = window.App.VERSION;
        }

        if ('serviceWorker' in navigator && location.protocol !== 'file:') {
            navigator.serviceWorker.register('./sw.js?v=' + window.App.VERSION, { updateViaCache: 'none' }).catch(function () {});
        }
    })();
    </script>
</body>
</html>
